<mat-sidenav-container class="shell">
  <mat-sidenav
    class="shell__sidenav"
    mode="over"
    [opened]="sidenavOpened()"
    (openedChange)="onSidenavOpenedChange($event)"
  >
    <div class="shell__brand">
      <img class="shell__logo" src="/logo_negro.png" alt="Construcciones El Tigre" />
    </div>

    <nav class="shell__nav">
      <!-- Inicio -->
      <a
        class="shell__nav-link"
        [routerLink]="homeLink.path"
        routerLinkActive="shell__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidenav()"
      >
        <mat-icon class="shell__nav-link-icon">{{ homeLink.icon }}</mat-icon>
        <span class="shell__nav-link-label">{{ homeLink.label }}</span>
      </a>

      <!-- Grupos con submenús -->
      <mat-accordion class="shell__accordion" [multi]="true">
        @for (group of navGroups; track group.label) {
          <mat-expansion-panel
            class="shell__nav-group"
            [expanded]="isGroupActive(group)"
          >
            <mat-expansion-panel-header class="shell__nav-group-header">
              <mat-panel-title class="shell__nav-group-title">
                <mat-icon class="shell__nav-group-icon">{{ group.icon }}</mat-icon>
                {{ group.label }}
              </mat-panel-title>
            </mat-expansion-panel-header>

            @for (link of group.links; track link.path) {
              <a
                class="shell__nav-sublink"
                [routerLink]="link.path"
                routerLinkActive="shell__nav-sublink--active"
                [routerLinkActiveOptions]="{ exact: false }"
                (click)="closeSidenav()"
              >
                <mat-icon class="shell__nav-sublink-icon">{{ link.icon }}</mat-icon>
                <span class="shell__nav-sublink-label">{{ link.label }}</span>
              </a>
            }
          </mat-expansion-panel>
        }
      </mat-accordion>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="shell__content">
    <mat-toolbar color="primary" class="shell__toolbar">
      <button class="shell__menu-toggle" mat-icon-button (click)="toggleSidenav()">
        <mat-icon>menu</mat-icon>
      </button>
      <img class="shell__toolbar-logo" src="/logo.png" alt="Construcciones El Tigre" />
      <span class="shell__toolbar-title">{{ pageTitle() }}</span>
      <span class="shell__spacer"></span>
      @if (displayName()) {
        <span class="shell__user">Hola, {{ displayName() }}</span>
      }
      <button class="shell__logout" mat-button (click)="logout()" aria-label="Cerrar sesión">
        <mat-icon class="shell__logout-icon">logout</mat-icon>
        <span class="shell__logout-label">Cerrar sesión</span>
      </button>
    </mat-toolbar>

    <main class="shell__page">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
