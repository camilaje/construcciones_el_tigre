<div class="login">
  <mat-card class="login__card">
    <mat-card-content class="login__content">
      <div class="login__brand">
        <img class="login__logo" src="/logo.png" alt="Construcciones El Tigre" />
        <h1 class="login__title">Control de Herramientas</h1>
      </div>

      <form class="login__form" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field class="login__field" appearance="outline">
          <mat-label>Correo</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
        </mat-form-field>

        <mat-form-field class="login__field" appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>

        @if (errorMessage()) {
          <p class="login__error">{{ errorMessage() }}</p>
        }

        <button class="login__submit" mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading()">
          @if (loading()) {
            <mat-spinner class="login__spinner" diameter="20" />
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
